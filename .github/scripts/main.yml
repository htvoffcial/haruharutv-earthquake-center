name: JMA Earthquake Monitor

on:
  schedule:
    # 5分ごとに実行 (気象庁のサーバー負荷軽減のため最短でも5分程度を推奨)
    - cron: '*/5 * * * *'
  workflow_dispatch: # 手動実行も可能にする

permissions:
  contents: write # リポジトリへの書き込み権限を許可

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Earthquake Monitor
      run: python monitor.py

    - name: Commit and Push if changed
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # nearly-earthquake.jsonに変更があるか確認
        if git status --porcelain | grep -q "nearly-earthquake.json"; then
          git add nearly-earthquake.json
          git commit -m "Update: 震度3以上の最新地震情報を更新"
          git push
          echo "JSONファイルを更新してプッシュしました。"
        else
          echo "変更はありませんでした。"
        fi
