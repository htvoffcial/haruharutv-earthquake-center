name: JMA Earthquake Monitor
'on':
  schedule:
    - cron: '*/8 * * * *'
  workflow_dispatch: null
permissions:
  contents: write
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests xmltodict
      - name: Run Earthquake Monitor
        run: python .github/scripts/monitor.py
      - name: Commit and Push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if git status --porcelain | grep -q "nearly-earthquake.json"; then
            git add nearly-earthquake.json
            git commit -m "Update: 直近の地震情報3以上の震度情報を更新"
            git push
            echo "JSONファイルが更新されました。"
          else
            echo "変更はありません。"
          fi
